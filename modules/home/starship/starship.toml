"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](os_bg)\
$os\
[¯é┤](fg:os_bg bg:dir_bg)\
$directory\
[¯é░](fg:dir_bg bg:git_bg)\
$git_branch\
$git_status\
[¯é░](fg:git_bg bg:lang_bg)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
