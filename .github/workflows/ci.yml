name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  macos-check:
    runs-on: macos-latest
    steps:
      # 1. コードのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # 2. 固定バージョンのDeterminate Nixをインストール
      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
      # 3. Git管理外の実機プロファイルをCI用fixtureで補完
      - name: Create CI user profile
        run: |
          cat > user-profiles/hisuilab.nix <<'EOF'
          {
            username = "hisuilab";
            description = "CI user profile";
            git = {
              userName = "hisuilab";
              userEmail = "ci@example.com";
            };
          }
          EOF
          git add -f user-profiles/hisuilab.nix
      # 4. 全systemの構文・依存・型評価
      - name: Evaluate all systems
        run: nix flake check path:. --no-build --all-systems
      # 5. macOS checksを実ビルド
      - name: Build macOS checks
        run: nix flake check path:.

  linux-check:
    runs-on: ubuntu-latest
    steps:
      # 1. コードのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # 2. aarch64-linux エミュレーション（Raspberry Pi 5 ビルド用）
      - name: Set up QEMU for aarch64 emulation
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      # 3. macOSと同じ固定バージョンのNixをインストール（aarch64-linux を追加プラットフォームとして登録）
      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
        with:
          extra-conf: |
            extra-platforms = aarch64-linux
      # 4. Ubuntu native構成を実ビルド
      - name: Build Ubuntu Desktop Home Manager configuration
        run: nix build path:.#checks.x86_64-linux.ubuntuDesktopMockEval --no-link
      # 5. WSL構成をLinuxソフトウェアレベルで実ビルド
      - name: Build Ubuntu WSL Home Manager configuration
        run: nix build path:.#checks.x86_64-linux.ubuntuWslMockEval --no-link
      # 6. Raspberry Pi 5構成をQEMUエミュレーションで実ビルド（実機不要）
      - name: Build Raspberry Pi 5 Home Manager configuration
        run: nix build path:.#checks.aarch64-linux.raspberryPi5MockEval --no-link

  nix-check:
    needs:
      - macos-check
      - linux-check
    runs-on: ubuntu-latest
    steps:
      - name: Confirm all Nix checks passed
        run: echo "All Nix checks passed."
