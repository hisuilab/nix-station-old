name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  macos-check:
    runs-on: macos-latest
    steps:
      # 1. コードのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # 2. 固定バージョンのDeterminate Nixをインストール
      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
      # 3. checks.* を評価（darwinConfigurations.* は guest プロファイルのため除外）
      #    hosts/*/config.nix の userProfile.name = "guest" は未設定ホストのシグナルであり
      #    assertions が Nix 評価時に発火するのは設計上の想定動作。
      #    CI での検証は checks.* に限定する（testUserProfile を注入済み）。
      - name: Evaluate checks
        run: bash scripts/ai/verify.sh
      # 4. macOS ユニットテストを実ビルド・実行
      - name: Build macOS unit tests
        run: nix build --no-link path:.#checks.aarch64-darwin.tests

  linux-check:
    runs-on: ubuntu-latest
    steps:
      # 1. コードのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # 2. aarch64-linux エミュレーション（Raspberry Pi 5 ビルド用）
      - name: Set up QEMU for aarch64 emulation
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      # 3. macOSと同じ固定バージョンのNixをインストール（aarch64-linux を追加プラットフォームとして登録）
      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
        with:
          extra-conf: |
            extra-platforms = aarch64-linux
      # 4. Ubuntu native構成を実ビルド
      - name: Build Ubuntu Desktop Home Manager configuration
        run: nix build path:.#checks.x86_64-linux.ubuntu-desktop --no-link
      # 5. WSL構成をLinuxソフトウェアレベルで実ビルド
      - name: Build Ubuntu WSL Home Manager configuration
        run: nix build path:.#checks.x86_64-linux.ubuntu-wsl --no-link
      # 6. Raspberry Pi 5構成をQEMUエミュレーションで実ビルド（実機不要）
      - name: Build Raspberry Pi 5 Home Manager configuration
        run: nix build path:.#checks.aarch64-linux.raspberry-pi-5 --no-link

  nix-check:
    needs:
      - macos-check
      - linux-check
    runs-on: ubuntu-latest
    steps:
      - name: Confirm all Nix checks passed
        run: echo "All Nix checks passed."
