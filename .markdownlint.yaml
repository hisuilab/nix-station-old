default: true

# 行長制限を無効化（日本語文書は行が長くなりやすい）
MD013: false

# テーブルのスタイル強制を無効化（|---|---| 形式を維持する）
MD060: false

# 同名見出しの重複を許可（「原因」「対処」など並列構造が自然な日本語ドキュメント）
MD024: false

# コードブロックの言語指定を任意に（既存ファイルへの一括修正が困難）
MD040: false

# GitHub callout 構文（> [!TIP] など）を連続して使うと誤検知するため無効化
MD028: false

# コードブロック前後の空行を強制しない（.claude/commands/*.md の形式と相性が悪い）
MD031: false

# 見出し・リスト周囲の空行を強制しない（レビューテンプレートの密なフォーマットに対応）
MD022: false
MD032: false

# インライン HTML を許可（バッジや特殊マークアップ）
MD033: false

# 最初の行が h1 でなくてもよい（AGENTS.md など見出しなしで始まるファイルがある）
MD041: false
