palette = 'nord'

# os_bg  : OS/username segment background
# dir_bg  : directory segment background
# git_bg  : git segment background
# lang_bg : programming language segment background
# env_bg  : environment (docker/conda) segment background
# time_bg : time segment background
# fg      : text color on all segments
# ok      : success / vim-normal symbol
# err     : error symbol
# warn    : vim-replace symbol
# info    : vim-visual symbol

