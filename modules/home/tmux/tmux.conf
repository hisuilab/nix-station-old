# Prefix
set -g prefix C-q
unbind C-b
bind C-q send-prefix

# Mouse support
set -g mouse on

# Status bar
set -g status on
set -g status-position bottom

# No background bar color
set -g status-style 'bg=default,fg=default'

set -g status-left '#{?client_prefix,[P] ,}#S'
set -g status-right '%Y-%m-%d %a %H:%M'

# Reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Split panes
bind v split-window -v   # Vertical split (left/right)
bind s split-window -h   # Horizontal split (top/bottom)

# Built-in layouts
bind m select-layout main-vertical     # Main pane on the left
bind M select-layout main-horizontal   # Main pane on the top
bind T select-layout tiled             # Even grid layout

# Navigate panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navigate panes without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window navigation
bind Tab last-window
bind n next-window
bind p previous-window

# Close pane and window
bind x kill-pane
bind X kill-window

# Detach from session
bind q detach-client

# Show pane numbers
bind Space display-panes

# Open session/window/pane tree
bind t choose-tree -Z
