"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](os_bg)\
$os\
[Ņé┤](fg:os_bg bg:dir_bg)\
$directory\
[Ņé░](fg:dir_bg bg:git_bg)\
$git_branch\
$git_status\
[Ņé░](fg:git_bg bg:lang_bg)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](fg:lang_bg bg:env_bg)\
$docker_context\
$conda\
$pixi\
[Ņé░](fg:env_bg bg:time_bg)\
$time\
[Ņé┤ ](fg:time_bg)\
$line_break$character"""

palette = 'nord'

# os_bg  : OS/username segment background
# dir_bg  : directory segment background
# git_bg  : git segment background
# lang_bg : programming language segment background
# env_bg  : environment (docker/conda) segment background
# time_bg : time segment background
# fg      : text color on all segments
# ok      : success / vim-normal symbol
# err     : error symbol
# warn    : vim-replace symbol
# info    : vim-visual symbol
[palettes.tokyo_night]
os_bg   = '#313e59'
dir_bg  = '#6f93df'
git_bg  = '#565f89'
lang_bg = '#414868'
env_bg  = '#394b70'
time_bg = '#24283b'
fg      = '#c0caf5'
ok      = '#9ece6a'
err     = '#f7768e'
warn    = '#e0af68'
info    = '#7dcfff'
[palettes.dracula]
os_bg   = '#454e6b'
dir_bg  = '#ff79c6'
git_bg  = '#bd93f9'
lang_bg = '#8be9fd'
env_bg  = '#6272a4'
time_bg = '#44475a'
fg      = '#f8f8f2'
ok      = '#50fa7b'
err     = '#ff5555'
warn    = '#f1fa8c'
info    = '#8be9fd'
[os]
disabled = false
style = "bg:os_bg fg:fg"
format = "[ $symbol ]($style)"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
