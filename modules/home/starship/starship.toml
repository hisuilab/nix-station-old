[directory]
style = "fg:fg bg:dir_bg"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "
[git_branch]
symbol = "’Éś"
style = "bg:git_bg"
format = '[[ $symbol $branch ](fg:fg bg:git_bg)]($style)'

[git_status]
style = "bg:git_bg"
format = '[[($all_status$ahead_behind )](fg:fg bg:git_bg)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[bun]
symbol = "ŅØ»"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[c]
symbol = "Ņś× "
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[cpp]
symbol = "ŅśØ "
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[php]
symbol = "Ņśł"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[java]
symbol = "Ņē¢"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[python]
