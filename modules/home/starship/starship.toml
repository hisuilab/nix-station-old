style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:fg bg:lang_bg)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:env_bg"
format = '[[ $symbol( $context) ](fg:fg bg:env_bg)]($style)'

[conda]
style = "bg:env_bg"
format = '[[ $symbol( $environment) ](fg:fg bg:env_bg)]($style)'

[pixi]
style = "bg:env_bg"
format = '[[ $symbol( $version)( $environment) ](fg:fg bg:env_bg)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:time_bg"
format = '[[ ’É║ $time ](fg:fg bg:time_bg)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:ok)'
error_symbol = '[ŌØ»](bold fg:err)'
vimcmd_symbol = '[ŌØ«](bold fg:ok)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:warn)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:warn)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:info)'
