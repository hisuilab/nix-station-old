name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  nix-check:
    runs-on: macos-latest
    steps:
      # 1. コードのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
      # 2. GitHub Actions環境へのNixのインストール
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      # 3. Flakeの構文・依存・型評価のテストを実行
      - name: Run nix flake check
        run: nix flake check
